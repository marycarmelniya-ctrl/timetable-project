<!DOCTYPE html>
<html>
<head>
    <title>Timetable Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --bg-color: #f3f4f6;
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: #f9fafb;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: -0.025em;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #d1d5db;
        }

        .sidebar a:hover {
            background-color: var(--sidebar-hover);
            color: #ffffff;
            transform: translateX(4px);
        }

        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #111827;
            letter-spacing: -0.025em;
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #374151;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            padding: 24px;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .card h3 {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            margin: 0 0 8px 0;
            font-weight: 500;
        }

        .card p {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }

        .blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .green { background: linear-gradient(135deg, #10b981, #059669); }
        .orange { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .red { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .btn {
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
            margin-right: 12px;
            margin-bottom: 12px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            background: #ffffff;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .flex-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-top: 16px;
        }

        th {
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 16px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        hr {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 32px 0;
        }

        .glass-panel {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 32px;
        }

        /* TOAST CSS */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }
        .toast {
            background: var(--secondary);
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            margin-top: 12px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { 
            opacity: 1; 
            transform: translateY(0);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>📊 Dashboard</h2>
    <a onclick="getTeachers()">👨‍🏫 Teachers</a>
    <a onclick="getClasses()">🏫 Classes</a>
    <a onclick="getRooms()">🚪 Rooms</a>
    <a onclick="getLessons()">📅 Timetable</a>
    <a onclick="getAnalytics()">📈 Analytics</a>
</div>

<div id="toast-container"></div>
<div class="main">

    <h1>Timetable Management System</h1>

    <div class="glass-panel">
        <h3>Quick Actions</h3>
        <div style="display: flex; gap: 12px; margin-bottom: 20px;">
            <button class="btn" onclick="generateTimetable()">⚡ Generate Timetable</button>
            <button class="btn" style="background-color: #64748b;" onclick="downloadTimetable()">Download Timetable</button>
        </div>

        <h3>My Timetable</h3>
        <div class="flex-row">
            <select id="teacherSelect" style="max-width: 300px;">
                <option value="">Select Teacher</option>
            </select>
            <button class="btn" onclick="viewTeacherTimetable()">View</button>
        </div>
    </div>

    <!-- 🔥 SMART RELIEF & DIGITAL HANDOVER -->
    <div class="glass-panel">
        <h3>Report Absence & Request Relief</h3>
        <div class="flex-row">
            <select id="reliefTeacher" style="max-width: 250px;">
                <option value="">Select Absent Teacher</option>
            </select>
            <select id="reliefDay" style="max-width: 200px;">
                <option value="">Select Day</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
            </select>
            <input type="number" id="reliefPeriod" placeholder="Period (1-5)" min="1" max="5" style="max-width: 150px;">
        </div>
        <textarea id="handoverNote" rows="3" placeholder="Digital Handover: Enter lesson instructions or links to study materials..."></textarea>
        <button class="btn" style="margin-top: 16px; background-color: var(--secondary);" onclick="assignRelief()">Assign Relief Teacher</button>
    </div>

    <div class="cards">
        <div class="card blue" onclick="getTeachers()">
            <h3>Teachers</h3>
            <p id="teacherCount">0</p>
        </div>

        <div class="card green" onclick="getClasses()">
            <h3>Classes</h3>
            <p id="classCount">0</p>
        </div>

        <div class="card orange" onclick="getRooms()">
            <h3>Rooms</h3>
            <p id="roomCount">0</p>
        </div>

        <div class="card red" onclick="getLessons()">
            <h3>Timetable</h3>
            <p id="lessonCount">0</p>
        </div>
    </div>

    <div class="glass-panel" id="displayArea">
        <h3 style="color: #94a3b8; text-align: center; margin-top: 20px;">Select an option from the dashboard to view data</h3>
    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {
    let currentView = "";

    const displayArea = document.getElementById("displayArea");
    const teacherCount = document.getElementById("teacherCount");
    const classCount = document.getElementById("classCount");
    const roomCount = document.getElementById("roomCount");
    const lessonCount = document.getElementById("lessonCount");

    function loadCounts() {
        fetch("/teachers").then(res => res.json()).then(data => teacherCount.innerText = data.length);
        fetch("/classes").then(res => res.json()).then(data => classCount.innerText = data.length);
        fetch("/rooms").then(res => res.json()).then(data => roomCount.innerText = data.length);
        fetch("/lessons").then(res => res.json()).then(data => lessonCount.innerText = data.length);
    }

    function generateTimetable() {
        fetch("/generate-timetable", { method: "POST" })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadCounts();
        });
    }

    function downloadTimetable() {
        let content = displayArea.innerHTML;
        let blob = new Blob([`<html><body>${content}</body></html>`], { type: "text/html" });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "timetable.html";
        a.click();
    }

    function loadTeacherDropdown() {
        fetch("/teachers")
        .then(res => res.json())
        .then(data => {
            let select1 = document.getElementById("teacherSelect");
            let select2 = document.getElementById("reliefTeacher");
            select1.innerHTML = '<option value="">Select Teacher</option>';
            select2.innerHTML = '<option value="">Select Absent Teacher</option>';
            data.forEach(t => {
                let option1 = document.createElement("option");
                option1.value = t.id;
                option1.text = t.name;
                select1.appendChild(option1);
                
                let option2 = document.createElement("option");
                option2.value = t.id;
                option2.text = t.name;
                select2.appendChild(option2);
            });
        });
    }

    function viewTeacherTimetable() {
        currentView = "teacherTimetable";
        let teacherId = document.getElementById("teacherSelect").value;
        fetch("/lessons")
        .then(res => res.json())
        .then(data => {
            let filtered = data.filter(l => l.teacher_id == teacherId);
            let html = "<h2>My Timetable</h2><table><tr><th>Day</th><th>Period</th><th>Subject</th></tr>";
            filtered.forEach(l => {
                html += `<tr><td>${l.day}</td><td>${l.period}</td><td>${l.subject}</td></tr>`;
            });
            html += "</table>";
            displayArea.innerHTML = html;
        });
    }

    function getTeachers() {
        currentView = "teachers";
        fetch("/teachers")
        .then(res => res.json())
        .then(data => {
            let html = "<h2>Teachers</h2><table><tr><th>Name</th><th>Department</th></tr>";
            data.forEach(t => {
                html += `<tr><td>${t.name}</td><td>${t.department}</td></tr>`;
            });
            html += "</table>";
            displayArea.innerHTML = html;
        });
    }

    function getClasses() {
        currentView = "classes";
        fetch("/classes")
        .then(res => res.json())
        .then(data => {
            let html = "<h2>Classes</h2><table><tr><th>Class</th><th>Section</th></tr>";
            data.forEach(c => {
                html += `<tr><td>${c.class_name}</td><td>${c.section}</td></tr>`;
            });
            html += "</table>";
            displayArea.innerHTML = html;
        });
    }

    function getRooms() {
        currentView = "rooms";
        fetch("/rooms")
        .then(res => res.json())
        .then(data => {
            let html = "<h2>Rooms</h2><table><tr><th>Room</th><th>Capacity</th></tr>";
            data.forEach(r => {
                html += `<tr><td>${r.room_number}</td><td>${r.capacity}</td></tr>`;
            });
            html += "</table>";
            displayArea.innerHTML = html;
        });
    }

    function getLessons() {
        currentView = "lessons";
        fetch("/lessons")
        .then(res => res.json())
        .then(data => {

            let days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
            let periods = [1,2,3,4,5];

            let classes = [...new Set(data.map(l => l.class_id))];
            let html = "<h2>Weekly Timetable</h2>";

            classes.forEach(classId => {
                html += `<h3>Class ${classId}</h3><table><tr><th>Day</th>`;
                periods.forEach(p => html += `<th>P${p}</th>`);
                html += "</tr>";

                days.forEach(day => {
                    html += `<tr><td>${day}</td>`;
                    periods.forEach(p => {
                        let lesson = data.find(l =>
                            l.day === day &&
                            l.period === p &&
                            l.class_id === classId
                        );
                        html += `<td>${lesson ? lesson.subject : "-"}</td>`;
                    });
                    html += "</tr>";
                });

                html += "</table><br>";
            });

            displayArea.innerHTML = html;
        });
    }

    // 🔥 SMART RELIEF FUNCTION & DIGITAL HANDOVER
    function assignRelief() {
        let teacher_id = document.getElementById("reliefTeacher").value;
        let day = document.getElementById("reliefDay").value;
        let period = document.getElementById("reliefPeriod").value;
        let note = document.getElementById("handoverNote").value;

        fetch("/assign-relief", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ teacher_id, day, period, note })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
            } else {
                showToast(data.message);
                document.getElementById("handoverNote").value = "";
                getLessons();
            }
        });
    }

    function showToast(message) {
        let container = document.getElementById("toast-container");
        let toast = document.createElement("div");
        toast.className = "toast show";
        toast.innerText = "🔔 " + message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }

    // 🔥 WORKLOAD ANALYTICS
    function getAnalytics() {
        currentView = "analytics";
        displayArea.innerHTML = "<h2>Teacher Workload Analytics</h2><canvas id='analyticsChart'></canvas>";
        fetch("/api/analytics")
        .then(res => res.json())
        .then(data => {
            let labels = data.map(t => t.name);
            let lessonData = data.map(t => t.total_lessons);
            let reliefData = data.map(t => t.total_reliefs);

            let ctx = document.getElementById("analyticsChart").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "Regular Lessons",
                            backgroundColor: "#3498db",
                            data: lessonData
                        },
                        {
                            label: "Relief Duties",
                            backgroundColor: "#e74c3c",
                            data: reliefData
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, stacked: true },
                        x: { stacked: true }
                    }
                }
            });
        });
    }

    // 🔥 expose functions
    window.generateTimetable = generateTimetable;
    window.downloadTimetable = downloadTimetable;
    window.getTeachers = getTeachers;
    window.getClasses = getClasses;
    window.getRooms = getRooms;
    window.getLessons = getLessons;
    window.viewTeacherTimetable = viewTeacherTimetable;
    window.assignRelief = assignRelief;
    window.getAnalytics = getAnalytics;

    loadCounts();
    loadTeacherDropdown();

    // 🔥 REAL-TIME
    setInterval(() => {
        if (currentView === "lessons") {
            getLessons();
        }
    }, 5000);

});

</script>

</body>
</html>
